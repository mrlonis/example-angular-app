<mat-card class="example-card" appearance="outlined">
  <mat-card-content class="card-content">
    @for (column of fullListOfColumns(); track $index) {
      <mat-checkbox
        [checked]="columnsToDisplay().includes(column)"
        (change)="setColumnsToDisplay($event, $index)"
      >
        {{ column }}
      </mat-checkbox>
    }
  </mat-card-content>
</mat-card>
